
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rail Defusal Terminal (CoC)</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:-apple-system,system-ui,sans-serif; background:#0f0f12; color:#eee; }
    header { padding:14px 16px; border-bottom:1px solid #23232a; position:sticky; top:0; background:#0f0f12; z-index:5; }
    main { max-width:980px; margin:0 auto; padding:16px; }
    h1 { margin:0; font-size:18px; }
    h2 { margin:18px 0 10px; font-size:16px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .card { background:#16161c; border:1px solid #262631; border-radius:14px; padding:14px; }
    .grow { flex:1 1 340px; }
    .muted { color:#a6a6b3; }
    .big { font-size:40px; font-weight:800; letter-spacing:0.5px; }
    .pill { display:inline-block; padding:4px 10px; border:1px solid #2e2e3b; border-radius:999px; font-size:12px; }
    .ok { color:#7CFC98; }
    .bad { color:#ff6b6b; }
    .split { display:flex; gap:12px; align-items:center; justify-content:space-between; }
    button { width:100%; padding:14px; border-radius:14px; border:1px solid #2e2e3b; background:#1f1f28; color:#eee; font-size:16px; }
    button:active { transform:translateY(1px); }
    button.small { width:auto; padding:10px 12px; font-size:14px; }
    button.cta { font-size:20px; font-weight:900; padding:18px; }
    button:disabled { opacity:0.45; }
    input, textarea, select {
      width:100%; box-sizing:border-box; padding:12px; border-radius:12px;
      border:1px solid #2e2e3b; background:#121218; color:#eee; font-size:16px;
    }
    textarea { min-height:100px; resize:vertical; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    @media (max-width:560px){ .grid3 { grid-template-columns:1fr 1fr; } }
    ul.log { list-style:none; padding:0; margin:0; }
    ul.log li { padding:8px 0; border-bottom:1px solid #23232a; }
    .danger { border-color:#5a2a2a; }
    .tiny { font-size:12px; }
    .meter {
      height:10px; border-radius:999px; background:#0d0d12; border:1px solid #2e2e3b;
      overflow:hidden;
    }
    .meter > div { height:100%; background:#2e2e3b; }
    .switches { display:flex; gap:10px; flex-wrap:wrap; }
    .sw {
      display:flex; align-items:center; gap:8px;
      padding:10px 12px; border:1px solid #2e2e3b; border-radius:14px; background:#121218;
      user-select:none;
    }
    .sw input { width:auto; }
    .centerBox {
      display:flex; align-items:center; justify-content:center;
      padding:18px; border-radius:16px; border:1px dashed #2e2e3b;
      background:#121218;
    }
    .carsWrap { margin-bottom:12px; }
    .carsTitle { margin-bottom:8px; font-size:12px; color:#a6a6b3; }
    .cars {
      display:grid; grid-template-columns:repeat(7, 1fr); gap:8px;
    }
    .car {
      border:1px solid #2e2e3b;
      border-radius:12px;
      background:#14141a;
      padding:10px 6px;
      text-align:center;
      min-height:58px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
      transition:background .25s, border-color .25s, color .25s;
    }
    .car .num { font-weight:800; }
    .car .role { font-size:11px; color:#a6a6b3; }
    .car.destroyed {
      background:#3a1414;
      border-color:#8f2f2f;
      color:#ffb3b3;
    }
    .car.destroyed .role { color:#ffc7c7; }
    .overlayCard {
      text-align:center;
      font-size:34px;
      font-weight:900;
      padding:34px 16px;
    }
    .flashRed {
      animation: flashred .8s ease-in-out 2;
    }
    @keyframes flashred {
      0%,100% { background:#3a1414; }
      50% { background:#6a1d1d; }
    }
  </style>
</head>
<body>
<header class="split">
  <h1>運行解除端末</h1>
  <div class="row" style="gap:8px;">
    <button id="kpToggleBtn" class="small">KPモード</button>
    <button id="resetBtn" class="small">リセット</button>
  </div>
</header>

<main>
  <div class="carsWrap card">
    <div class="carsTitle">列車状態</div>
    <div id="carsLine" class="cars"></div>
  </div>

  <div class="row">
    <div class="card grow">
      <div class="split">
        <div>
          <div class="muted">状態</div>
          <div id="statusLine" class="pill"></div>
          <div class="muted tiny" id="stageHint" style="margin-top:8px;"></div>
        </div>
        <div style="text-align:right;">
          <div class="muted" id="rightTitle">次駅まで</div>
          <div id="rightBig" class="big"></div>
        </div>
      </div>

      <div style="margin-top:10px;" class="grid3">
        <div>
          <div class="muted tiny">現在速度</div>
          <div id="speedLine" style="font-size:22px;font-weight:800;">--</div>
        </div>
        <div>
          <div class="muted tiny">周波数</div>
          <div id="freqLine" style="font-size:22px;font-weight:800;">--</div>
          <div class="muted tiny" id="freqCommitLine" style="margin-top:6px;"></div>
        </div>
        <div>
          <div class="muted tiny">エリア解除</div>
          <div id="areaLine" style="font-size:22px;font-weight:800;">--</div>
        </div>
      </div>

      <div style="margin-top:12px;">
        <div class="muted tiny">進捗</div>
        <div id="progressLine" style="margin-top:6px;"></div>
      </div>
    </div>

    <div class="card grow">
      <div class="muted">現在の判定</div>
      <div id="stationLine" style="font-size:22px;font-weight:900;margin-top:6px;">--</div>
      <div class="muted tiny" id="stationHint" style="margin-top:8px;"></div>
      <div style="margin-top:10px;">
        <div class="muted tiny">注意</div>
        <div class="pill bad" style="margin-top:6px;">停止（速度0）＝即爆発</div>
      </div>
    </div>
  </div>

  <h2>操作</h2>
  <div class="card" id="actionCard"></div>

  <h2>ログ</h2>
  <div class="card">
    <ul class="log" id="logList"></ul>
  </div>

  <h2 id="kpTitle" style="display:none;">KP管理</h2>
  <div class="card" id="kpPanel" style="display:none;"></div>
</main>

<script>
(() => {
  const defaultCfg = {
    stations: [
      { name:"駅1", type:"speed", targetSpeed:63 },
      { name:"駅2", type:"freq",  targetFreq:118.7 },
      { name:"駅3", type:"area",  targetCode:"7F-K2", targetSwitch:"SW-B" },
    ],
    segmentTurns: 4,

    speedMin: 40,
    speedMax: 80,
    speedStep: 1,

    freqMin: 110.0,
    freqMax: 130.0,
    freqStep: 0.1,

    areaSwitches: ["SW-A","SW-B","SW-C"],

    brakeDrop: 10,
    finalTimeSec: 60,

    // final answer mode: "speed" or "ebrake"
    finalMode: "speed",
    finalTargetSpeed: 23,

    brakeDelayMs: 1800,
  };

  const CAR_ROLES = [
    "操縦室", "機器室", "客車A", "客車B", "客車C", "客車D", "最後尾"
  ];

  const state = {
    cfg: structuredClone(defaultCfg),

    status: "armed", // armed / exploded / defused
    phase: "route",  // route / final_ready / final / brake_anim

    turnsLeft: defaultCfg.segmentTurns,
    stationIndex: 0,
    stationResolvedCount: 0, // 3回判定したらfinal_readyへ
    cleared: [false,false,false],

    speed: 60,
    freq: 115.0,
    freqCommitted: null,

    areaSwitch: "SW-A",
    areaSwitchOn: false,
    areaCode: "",

    finalRemaining: defaultCfg.finalTimeSec,
    finalTimerId: null,

    destroyedCars: 0,        // 0,2,4,6
    earlyBrakeWarned: false, // 早引き警告を一度だけ

    log: [],
    kpUnlocked: false,
  };

  const KP_PASSWORD_HASH = "kp:" + "lovesushi";
  const $ = (id) => document.getElementById(id);
  const now = () => new Date().toLocaleTimeString();

  function addLog(msg, kind=""){
    const prefix = kind==="ok" ? "✓ " : kind==="bad" ? "✗ " : "";
    state.log.push({ t: now(), msg: prefix + msg });
    if(state.log.length > 100) state.log.shift();
  }

  function stopFinalTimer(){
    if(state.finalTimerId){
      clearInterval(state.finalTimerId);
      state.finalTimerId = null;
    }
  }

  function explode(reason){
    if(state.status!=="armed") return;
    state.status = "exploded";
    stopFinalTimer();
    addLog(reason, "bad");
    render();
  }

  function defuse(reason){
    if(state.status!=="armed") return;
    state.status = "defused";
    stopFinalTimer();
    addLog(reason || "解除成功", "ok");
    render();
  }

  function clampSpeed(){
    state.speed = Math.round(Math.max(state.cfg.speedMin, Math.min(state.cfg.speedMax, state.speed)));
    if(state.status==="armed" && state.speed <= 0){
      explode("列車停止：即爆発");
    }
  }

  function clampFreq(){
    const step = state.cfg.freqStep;
    const v = Math.round(state.freq / step) * step;
    state.freq = Math.max(state.cfg.freqMin, Math.min(state.cfg.freqMax, Math.round(v * 10) / 10));
  }

  function applyPenaltyForStationExplosion(){
    const before = state.destroyedCars;
    state.destroyedCars = Math.min(6, state.destroyedCars + 2);
    const start = 7 - state.destroyedCars + 1;
    const end = 7 - before;
    addLog(`後方車両が爆発に巻き込まれた：${start}〜${end}号車 使用不能`, "bad");
  }

  function handleStationFailure(detail){
    addLog(`駅爆弾失敗（${detail}）`, "bad");
    applyPenaltyForStationExplosion();

    state.stationResolvedCount += 1;
    state.stationIndex = Math.min(2, state.stationIndex + 1);
    state.turnsLeft = Number(state.cfg.segmentTurns);

    if(state.stationResolvedCount >= state.cfg.stations.length){
      state.phase = "final_ready";
      addLog("全駅通過。最終爆弾フェイズへ移行可能。");
    }

    render();
  }

  function passStation(){
    if(state.status!=="armed") return;
    if(state.phase!=="route") return;

    const st = state.cfg.stations[state.stationIndex];
    addLog(`${st.name} 通過判定…`);

    let ok = false;
    let detail = "";

    if(st.type==="speed"){
      ok = (Number(state.speed) === Number(st.targetSpeed));
      detail = `速度 ${state.speed}km/h / 条件 ${st.targetSpeed}`;
    }
    if(st.type==="freq"){
      if(state.freqCommitted === null){
        ok = false;
        detail = `未送信`;
      } else {
        ok = (Number(state.freqCommitted).toFixed(1) === Number(st.targetFreq).toFixed(1));
        detail = `送信 ${Number(state.freqCommitted).toFixed(1)}MHz / 条件 ${Number(st.targetFreq).toFixed(1)}`;
      }
    }
    if(st.type==="area"){
      const codeOk = String(state.areaCode).trim().toUpperCase() === String(st.targetCode).trim().toUpperCase();
      const swOk = (state.areaSwitchOn && state.areaSwitch === st.targetSwitch);
      ok = codeOk && swOk;
      detail = `コード ${codeOk?"OK":"NG"} / SW ${swOk?"OK":"NG"}`;
    }

    if(ok){
      state.cleared[state.stationIndex] = true;
      addLog(`${st.name} 爆弾解除（${detail}）`, "ok");
      state.stationResolvedCount += 1;
      state.stationIndex = Math.min(2, state.stationIndex + 1);
      state.turnsLeft = Number(state.cfg.segmentTurns);

      if(state.stationResolvedCount >= state.cfg.stations.length){
        state.phase = "final_ready";
        addLog("全駅通過。最終爆弾フェイズへ移行可能。");
      }
      render();
      return;
    }

    handleStationFailure(detail);
  }

  function advanceTurn(){
    if(state.status!=="armed") return;
    if(state.phase!=="route") return;

    state.turnsLeft -= 1;
    addLog(`ターン進行：次駅まで ${state.turnsLeft}`);
    if(state.turnsLeft <= 0){
      passStation();
    } else {
      render();
    }
  }

  function startFinalPhase(){
    if(state.status!=="armed") return;
    if(state.phase!=="final_ready") return;
    if(!confirm("最終爆弾フェイズに進みます。タイマーが起動します。OK？")) return;

    state.phase = "final";
    state.finalRemaining = Number(state.cfg.finalTimeSec);
    state.freqCommitted = null; // 最終は改めて送信し直し

    addLog(`最終爆弾フェイズ開始：残り ${state.finalRemaining} 秒`);
    stopFinalTimer();
    state.finalTimerId = setInterval(() => {
      if(state.status!=="armed" || (state.phase!=="final" && state.phase!=="brake_anim")) return;
      state.finalRemaining -= 1;
      if(state.finalRemaining <= 0){
        explode("最終爆弾が爆発しました");
      } else {
        renderTopRightOnly();
      }
    }, 1000);

    render();
  }

  function finalCommonStatus(){
    const freqOk = state.freqCommitted !== null &&
      Number(state.freqCommitted).toFixed(1) === Number(state.cfg.stations[1].targetFreq).toFixed(1);

    const codeOk = String(state.areaCode).trim().toUpperCase() === String(state.cfg.stations[2].targetCode).trim().toUpperCase();
    const swOk = state.areaSwitchOn && state.areaSwitch === state.cfg.stations[2].targetSwitch;
    const areaOk = codeOk && swOk;

    return { freqOk, areaOk, codeOk, swOk };
  }

  function attemptFinalPass(){
    if(state.status!=="armed") return;
    if(state.phase!=="final") return;

    const c = $("areaCode");
    if(c) state.areaCode = c.value;

    const common = finalCommonStatus();

    if(state.cfg.finalMode === "speed"){
      const speedOk = Number(state.speed) === Number(state.cfg.finalTargetSpeed);
      if(speedOk && common.freqOk && common.areaOk){
        defuse("解除成功");
      } else {
        addLog(
          `最終判定失敗（速度:${speedOk?"OK":"NG"} / 周波数:${common.freqOk?"OK":"NG"} / エリア:${common.areaOk?"OK":"NG"}）`,
          "bad"
        );
        render();
      }
      return;
    }

    // finalMode === "ebrake"
    if(common.freqOk && common.areaOk){
      state.phase = "brake_anim";
      addLog("最終判定通過：非常ブレーキ演出へ");
      render();
    } else {
      addLog(
        `最終判定失敗（周波数:${common.freqOk?"OK":"NG"} / エリア:${common.areaOk?"OK":"NG"}）`,
        "bad"
      );
      render();
    }
  }

  function pullEmergencyBrake(){
    if(state.status!=="armed") return;

    // 最終以外は警告一回→実行したら爆発
    if(state.phase !== "brake_anim"){
      if(!state.earlyBrakeWarned){
        state.earlyBrakeWarned = true;
        const ok = confirm("本当にこの操作をしても良いのだろうか？");
        if(!ok){
          addLog("非常ブレーキ操作を中止した");
          render();
          return;
        }
      }
      explode("非常ブレーキ作動：列車停止系統が作動し、爆発");
      return;
    }

    // brake_anim 中のみ正規演出
    addLog("非常ブレーキを引き切った…");
    state.phase = "brake_anim"; // keep
    render();

    const common = finalCommonStatus();

    setTimeout(() => {
      if(state.status!=="armed") return;
      if(common.freqOk && common.areaOk){
        defuse("解除成功");
      } else {
        // 通常はここへ来ないが、保険
        state.phase = "final";
        addLog("非常ブレーキ演出失敗：条件不足", "bad");
        render();
      }
    }, Number(state.cfg.brakeDelayMs));
  }

  function renderTopRightOnly(){
    if(state.phase==="final" || state.phase==="brake_anim"){
      $("rightTitle").textContent = "残り時間";
      $("rightBig").textContent = `${Math.max(0, state.finalRemaining)}s`;
    }
  }

  function escapeHtml(s){
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function renderCars(){
    const destroyedStart = 8 - state.destroyedCars; // e.g. 2 destroyed => 6,7 destroyed
    $("carsLine").innerHTML = CAR_ROLES.map((role, idx) => {
      const n = idx + 1;
      const destroyed = state.destroyedCars > 0 && n >= destroyedStart;
      return `
        <div class="car ${destroyed ? 'destroyed flashRed' : ''}">
          <div class="num">${destroyed ? 'X' : n}</div>
          <div class="role">${escapeHtml(role)}</div>
        </div>
      `;
    }).join("");
  }

  function renderFinalCommonText(){
    const common = finalCommonStatus();
    const modeText = state.cfg.finalMode === "speed"
      ? `指定速度 ${state.cfg.finalTargetSpeed}km/h`
      : `非常ブレーキを使用`;

    return `
      最終条件：
      ${escapeHtml(modeText)} /
      周波数 ${Number(state.cfg.stations[1].targetFreq).toFixed(1)}MHz 送信済み /
      エリア ${escapeHtml(state.cfg.stations[2].targetCode)} + ${escapeHtml(state.cfg.stations[2].targetSwitch)} ON
      <br>
      現在：
      周波数 ${common.freqOk ? "OK" : "NG"} /
      エリア ${common.areaOk ? "OK" : "NG"}
    `;
  }

  function renderActions(){
    const speedPct = ((state.speed - state.cfg.speedMin) / (state.cfg.speedMax - state.cfg.speedMin)) * 100;

    const routeButtons = state.phase==="route" ? `
      <div class="grid2" style="margin-top:12px;">
        <button onclick="window.__turn()">ターン進行（次駅まで -1）</button>
        <button onclick="window.__forcePass()">今すぐ通過判定（演出/デバッグ用）</button>
      </div>
    ` : "";

    const finalReady = state.phase==="final_ready" ? `
      <div class="centerBox" style="margin-bottom:12px;">
        <button class="cta" onclick="window.__startFinal()">最終爆弾フェイズへ</button>
      </div>
    ` : "";

    const finalButtons = state.phase==="final" ? `
      <div class="centerBox" style="margin-top:12px;">
        <button class="cta" onclick="window.__finalPass()">通過判定</button>
      </div>
    ` : "";

    const brakePrompt = state.phase==="brake_anim" ? `
      <div class="centerBox" style="margin-bottom:12px; flex-direction:column; gap:12px;">
        <div class="bad" style="font-size:22px;font-weight:900;">非常ブレーキを引け</div>
        <div class="muted tiny">機械の唸りが伝わってくる……</div>
        <button class="cta" onclick="window.__ebrake()">非常ブレーキを引き切る</button>
      </div>
    ` : "";

    const freezeOps = state.phase==="brake_anim";

    $("actionCard").innerHTML = `
      ${finalReady}
      ${brakePrompt}

      <div class="grid2">
        <div class="card" style="padding:12px;">
          <div class="labelbig">速度スライダー</div>
          <div class="muted tiny">停止＝即爆発</div>
          <input id="speedSlider" type="range"
            min="${state.cfg.speedMin}" max="${state.cfg.speedMax}" step="${state.cfg.speedStep}"
            value="${state.speed}" ${freezeOps ? "disabled" : ""} />
          <div class="split" style="margin-top:8px;">
            <span class="muted tiny">${state.cfg.speedMin}〜${state.cfg.speedMax}</span>
            <span class="pill">${state.speed} km/h</span>
          </div>
          <div class="meter" style="margin-top:10px;"><div style="width:${speedPct}%;"></div></div>

          <div style="margin-top:12px;" class="danger">
            <button ${freezeOps ? "disabled" : ""} onclick="window.__brake()">
              通常ブレーキ（-${state.cfg.brakeDrop} km/h）
            </button>
            <div class="muted tiny" style="margin-top:6px;">※非常ブレーキは状況により危険</div>
          </div>
        </div>

        <div class="card" style="padding:12px;">
          <div class="labelbig">周波数（ラジオ）</div>
          <div class="muted tiny">何度でも送信し直せる</div>

          <div class="split" style="margin-top:10px;">
            <button ${freezeOps ? "disabled" : ""} onclick="window.__tune(-1)">◀</button>
            <div style="text-align:center; min-width:140px;">
              <div class="pill">${state.freq.toFixed(1)} MHz</div>
              <div class="muted tiny">${state.cfg.freqMin.toFixed(1)}〜${state.cfg.freqMax.toFixed(1)}</div>
            </div>
            <button ${freezeOps ? "disabled" : ""} onclick="window.__tune(1)">▶</button>
          </div>

          <div class="grid2" style="margin-top:10px;">
            <button ${freezeOps ? "disabled" : ""} onclick="window.__tune(-5)">-0.5</button>
            <button ${freezeOps ? "disabled" : ""} onclick="window.__tune(5)">+0.5</button>
          </div>

          <div style="margin-top:10px;">
            <button ${freezeOps ? "disabled" : ""} onclick="window.__sendFreq()">送信して確定</button>
            <div class="muted tiny" style="margin-top:6px;">
              ${state.freqCommitted===null ? "未送信" : `送信済: ${Number(state.freqCommitted).toFixed(1)}MHz`}
            </div>
          </div>

          <div style="margin-top:14px;">
            <div class="labelbig">エリア解除</div>
            <div class="muted tiny">コード入力＋指定スイッチON</div>
            <input id="areaCode" placeholder="例：7F-K2" value="${escapeHtml(state.areaCode)}" ${freezeOps ? "disabled" : ""} />
            <div class="switches" style="margin-top:10px;">
              ${state.cfg.areaSwitches.map(sw => `
                <label class="sw">
                  <input type="radio" name="swsel" ${state.areaSwitch===sw?"checked":""}
                    ${freezeOps ? "disabled" : ""} onchange="window.__swsel('${sw}')" />
                  <span>${escapeHtml(sw)}</span>
                </label>
              `).join("")}
              <label class="sw">
                <input type="checkbox" ${state.areaSwitchOn?"checked":""}
                  ${freezeOps ? "disabled" : ""} onchange="window.__swon(this.checked)" />
                <span>スイッチON</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      ${routeButtons}
      ${finalButtons}

      ${state.phase==="final" ? `
        <div class="muted tiny" style="margin-top:12px;">${renderFinalCommonText()}</div>
      ` : ""}
    `;

    setTimeout(() => {
      const s = $("speedSlider");
      if(s){
        s.oninput = () => {
          state.speed = Number(s.value);
          clampSpeed();
          render();
        };
      }
      const c = $("areaCode");
      if(c){
        c.oninput = () => { state.areaCode = c.value; };
      }
    }, 0);
  }

  function renderTerminalMessage(){
    if(state.status==="exploded"){
      $("actionCard").innerHTML = `
        <div class="overlayCard bad">爆弾が爆発しました</div>
      `;
    } else if(state.status==="defused"){
      $("actionCard").innerHTML = `
        <div class="overlayCard ok">解除成功</div>
      `;
    }
  }

  function render(){
    renderCars();

    $("statusLine").textContent = `${state.status}${state.phase!=="route" ? " / " + state.phase : ""}`;
    $("statusLine").className = "pill " + (state.status==="defused" ? "ok" : state.status==="exploded" ? "bad" : "");

    if(state.phase==="final" || state.phase==="brake_anim"){
      $("rightTitle").textContent = "残り時間";
      $("rightBig").textContent = `${Math.max(0, state.finalRemaining)}s`;
    } else {
      $("rightTitle").textContent = "次駅まで";
      $("rightBig").textContent = `T-${Math.max(0, state.turnsLeft)}`;
    }

    $("speedLine").textContent = `${state.speed} km/h`;
    $("freqLine").textContent = `${state.freq.toFixed(1)} MHz`;
    $("freqCommitLine").innerHTML =
      state.freqCommitted===null
        ? `<span class="pill">未送信</span>`
        : `<span class="pill ok">送信済: ${Number(state.freqCommitted).toFixed(1)}MHz</span>`;
    $("areaLine").textContent = `${state.areaSwitch}${state.areaSwitchOn ? "(ON)" : "(OFF)"}`;

    if(state.phase==="route"){
      const st = state.cfg.stations[state.stationIndex];
      $("stationLine").textContent = st.name;
      $("stationHint").textContent =
        st.type==="speed" ? "駅1：通過瞬間の速度一致で解除。" :
        st.type==="freq"  ? "駅2：指定周波数を送信済みで通過すると解除。" :
                            "駅3：コード一致＋指定スイッチONで通過すると解除。";
      $("stageHint").textContent = "停止＝即爆発。駅爆弾失敗時は後方車両が失われる。";
    } else if(state.phase==="final_ready"){
      $("stationLine").textContent = "最終爆弾フェイズ待機";
      $("stationHint").textContent = "全駅通過。中央のボタンで最終フェイズへ。";
      $("stageHint").textContent = "最終条件はKPのみが知っている。";
    } else if(state.phase==="final"){
      $("stationLine").textContent = "最終爆弾フェイズ";
      $("stationHint").textContent = "条件を揃えて『通過判定』。";
      $("stageHint").textContent = "最終解答方式はKPのみが知っている。";
    } else if(state.phase==="brake_anim"){
      $("stationLine").textContent = "非常ブレーキ演出";
      $("stationHint").textContent = "今しか引けない。";
      $("stageHint").textContent = "引き切れ。";
    }

    const prog = [
      `${state.cfg.stations[0].name}:${state.cleared[0] ? "解除" : "未解除"}`,
      `${state.cfg.stations[1].name}:${state.cleared[1] ? "解除" : "未解除"}`,
      `${state.cfg.stations[2].name}:${state.cleared[2] ? "解除" : "未解除"}`,
      `車両被害:${state.destroyedCars}両`
    ].join(" / ");
    $("progressLine").innerHTML = `<span class="pill">${escapeHtml(prog)}</span>`;

    if(state.status==="armed"){
      renderActions();
    } else {
      renderTerminalMessage();
    }

    $("logList").innerHTML = state.log.slice().reverse().map(e =>
      `<li><span class="muted">${escapeHtml(e.t)}</span> — ${escapeHtml(e.msg)}</li>`
    ).join("") || `<li class="muted">（まだログはありません）</li>`;

    $("kpTitle").style.display = state.kpUnlocked ? "" : "none";
    $("kpPanel").style.display = state.kpUnlocked ? "" : "none";
    if(state.kpUnlocked) renderKP()
  }

  // ===== User actions =====
  window.__turn = () => {
    if(state.status!=="armed" || state.phase!=="route") return;
    const c = $("areaCode");
    if(c) state.areaCode = c.value;
    advanceTurn();
  };

  window.__forcePass = () => {
    if(state.status!=="armed" || state.phase!=="route") return;
    const c = $("areaCode");
    if(c) state.areaCode = c.value;
    if(!confirm("通過判定を実行します。OK？")) return;
    passStation();
  };

  window.__startFinal = () => startFinalPhase();

  window.__finalPass = () => {
    if(state.status!=="armed" || state.phase!=="final") return;
    const c = $("areaCode");
    if(c) state.areaCode = c.value;
    attemptFinalPass();
  };

  window.__brake = () => {
    if(state.status!=="armed") return;
    state.speed -= Number(state.cfg.brakeDrop);
    clampSpeed();
    addLog(`通常ブレーキ：速度 ${state.speed}km/h`);
    render();
  };

  window.__ebrake = () => pullEmergencyBrake();

  window.__tune = (stepMul) => {
    if(state.status!=="armed") return;
    if(state.phase==="brake_anim") return;
    state.freq += Number(stepMul) * Number(state.cfg.freqStep);
    clampFreq();
    addLog(`周波数：${state.freq.toFixed(1)}MHz`);
    render();
  };

  window.__sendFreq = () => {
    if(state.status!=="armed") return;
    if(state.phase==="brake_anim") return;
    state.freqCommitted = Number(state.freq.toFixed(1));
    addLog(`周波数送信：${state.freqCommitted.toFixed(1)}MHz`, "ok");
    render();
  };

  window.__swsel = (sw) => {
    if(state.status!=="armed") return;
    if(state.phase==="brake_anim") return;
    state.areaSwitch = sw;
    addLog(`スイッチ選択：${sw}`);
    render();
  };

  window.__swon = (on) => {
    if(state.status!=="armed") return;
    if(state.phase==="brake_anim") return;
    state.areaSwitchOn = !!on;
    addLog(`スイッチ ${on ? "ON" : "OFF"}`);
    render();
  };

  // ===== KP mode =====
  $("kpToggleBtn").addEventListener("click", () => {
    if(!state.kpUnlocked){
      const pw = prompt("KPパスワードを入力");
      if(!pw) return;
      if(("kp:" + pw) === KP_PASSWORD_HASH){
        state.kpUnlocked = true;
        addLog("KPモード：解錠");
      } else {
        alert("パスワードが違います");
      }
    } else {
      state.kpUnlocked = false;
      addLog("KPモード：ロック");
    }
    render();
  });

  function renderKP(){
    $("kpPanel").innerHTML = `
      <div class="muted tiny">KPのみ：条件・ペナルティ・最終方式を編集できます。</div>

      <h2>駅条件</h2>
      <div class="grid3">
        <div>
          <div class="muted tiny">駅1 速度</div>
          <input id="kp_speed1" type="number" value="${Number(state.cfg.stations[0].targetSpeed)}" />
        </div>
        <div>
          <div class="muted tiny">駅2 周波数</div>
          <input id="kp_freq2" type="number" step="0.1" value="${Number(state.cfg.stations[1].targetFreq)}" />
        </div>
        <div>
          <div class="muted tiny">駅3 コード</div>
          <input id="kp_code3" value="${escapeHtml(state.cfg.stations[2].targetCode)}" />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div>
          <div class="muted tiny">駅3 必要SW</div>
          <select id="kp_sw3">
            ${state.cfg.areaSwitches.map(sw => `<option ${sw===state.cfg.stations[2].targetSwitch?"selected":""}>${escapeHtml(sw)}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="muted tiny">駅間ターン</div>
          <input id="kp_segturn" type="number" value="${Number(state.cfg.segmentTurns)}" />
        </div>
      </div>

      <h2>最終条件</h2>
      <div class="grid2">
        <div>
          <div class="muted tiny">最終方式</div>
          <select id="kp_finalMode">
            <option value="speed" ${state.cfg.finalMode==="speed"?"selected":""}>指定速度</option>
            <option value="ebrake" ${state.cfg.finalMode==="ebrake"?"selected":""}>非常ブレーキ</option>
          </select>
        </div>
        <div>
          <div class="muted tiny">最終指定速度</div>
          <input id="kp_finalSpeed" type="number" value="${Number(state.cfg.finalTargetSpeed)}" />
        </div>
      </div>

      <div class="grid3" style="margin-top:12px;">
        <div>
          <div class="muted tiny">最終タイマー（秒）</div>
          <input id="kp_finalSec" type="number" value="${Number(state.cfg.finalTimeSec)}" />
        </div>
        <div>
          <div class="muted tiny">通常ブレーキ減速量</div>
          <input id="kp_brakeDrop" type="number" value="${Number(state.cfg.brakeDrop)}" />
        </div>
        <div>
          <div class="muted tiny">非常ブレーキ演出待機(ms)</div>
          <input id="kp_brakeDelay" type="number" value="${Number(state.cfg.brakeDelayMs)}" />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <button onclick="window.__kp_apply()">KP設定を適用</button>
        <button onclick="window.__kp_resetPenalty()">車両被害をリセット</button>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <button onclick="window.__kp_phase()">フェイズ強制変更</button>
        <button onclick="window.__kp_force('explode')">強制爆発</button>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <button onclick="window.__kp_force('defuse')">強制解除</button>
        <button onclick="window.__kp_note()">ログ追記</button>
      </div>

      <div style="margin-top:10px;">
        <input id="kp_note" placeholder="例：『通信室の端末が反応』" />
      </div>
    `;
  }

  window.__kp_apply = () => {
    if(!state.kpUnlocked) return;

    state.cfg.stations[0].targetSpeed = Number($("kp_speed1").value);
    state.cfg.stations[1].targetFreq = Number($("kp_freq2").value);
    state.cfg.stations[2].targetCode = ($("kp_code3").value || "").trim();
    state.cfg.stations[2].targetSwitch = $("kp_sw3").value;

    state.cfg.segmentTurns = Math.max(1, Number($("kp_segturn").value));
    state.cfg.finalMode = $("kp_finalMode").value;
    state.cfg.finalTargetSpeed = Number($("kp_finalSpeed").value);
    state.cfg.finalTimeSec = Math.max(5, Number($("kp_finalSec").value));
    state.cfg.brakeDrop = Math.max(1, Number($("kp_brakeDrop").value));
    state.cfg.brakeDelayMs = Math.max(200, Number($("kp_brakeDelay").value));

    addLog("KP操作：設定を適用");
    render();
  };

  window.__kp_resetPenalty = () => {
    if(!state.kpUnlocked) return;
    state.destroyedCars = 0;
    addLog("KP操作：車両被害をリセット");
    render();
  };

  window.__kp_phase = () => {
    if(!state.kpUnlocked) return;
    const next = prompt("phaseを入力（route / final_ready / final / brake_anim）", state.phase);
    if(!next) return;
    if(!["route","final_ready","final","brake_anim"].includes(next)) return alert("不正なフェイズです");
    state.phase = next;
    if(next!=="final" && next!=="brake_anim"){
      stopFinalTimer();
      state.finalRemaining = Number(state.cfg.finalTimeSec);
    }
    addLog(`KP操作：phaseを ${next} に変更`);
    render();
  };

  window.__kp_force = (what) => {
    if(!state.kpUnlocked) return;
    if(!confirm(`KP操作：${what==="defuse"?"強制解除":"強制爆発"}していい？`)) return;
    if(what==="defuse") defuse("解除成功");
    else explode("爆弾が爆発しました");
  };

  window.__kp_note = () => {
    if(!state.kpUnlocked) return;
    const v = ($("kp_note").value || "").trim();
    if(!v) return;
    addLog(`KPメモ：${v}`);
    $("kp_note").value = "";
    render();
  };

  // ===== Reset =====
  $("resetBtn").addEventListener("click", () => {
    if(!confirm("状態をリセットします（KP設定は維持）。OK？")) return;

    const keepCfg = structuredClone(state.cfg);
    const keepKP = state.kpUnlocked;

    stopFinalTimer();

    state.cfg = keepCfg;
    state.kpUnlocked = keepKP;

    state.status = "armed";
    state.phase = "route";

    state.turnsLeft = keepCfg.segmentTurns;
    state.stationIndex = 0;
    state.stationResolvedCount = 0;
    state.cleared = [false,false,false];

    state.speed = 60;
    state.freq = 115.0;
    state.freqCommitted = null;

    state.areaSwitch = "SW-A";
    state.areaSwitchOn = false;
    state.areaCode = "";

    state.finalRemaining = keepCfg.finalTimeSec;
    state.destroyedCars = 0;
    state.earlyBrakeWarned = false;

    state.log = [];
    addLog("システム起動。停止＝即爆発。条件を揃えて通過せよ。");
    render();
  });

  // init
  addLog("システム起動。停止＝即爆発。条件を揃えて通過せよ。");
  render();
})();
</script>
</body>
</html>
