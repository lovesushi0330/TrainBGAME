
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rail Defusal Terminal (CoC)</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      background: #0f0f12;
      color: #eee;
    }
    header {
      padding: 14px 16px;
      border-bottom: 1px solid #23232a;
      position: sticky;
      top: 0;
      background: #0f0f12;
      z-index: 10;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 { margin: 0; font-size: 18px; }
    h2 { margin: 18px 0 10px; font-size: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card {
      background: #16161c;
      border: 1px solid #262631;
      border-radius: 14px;
      padding: 14px;
    }
    .grow { flex: 1 1 340px; }
    .muted { color: #a6a6b3; }
    .big {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border: 1px solid #2e2e3b;
      border-radius: 999px;
      font-size: 12px;
    }
    .ok { color: #7CFC98; }
    .bad { color: #ff6b6b; }
    .split {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #2e2e3b;
      background: #1f1f28;
      color: #eee;
      font-size: 16px;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.45; }
    button.small {
      width: auto;
      padding: 10px 12px;
      font-size: 14px;
    }
    button.cta {
      font-size: 20px;
      font-weight: 900;
      padding: 18px;
    }
    button.onbtn {
      background: #17351f;
      border-color: #265938;
    }
    button.offbtn {
      background: #2a1414;
      border-color: #5a2a2a;
    }
    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #2e2e3b;
      background: #121218;
      color: #eee;
      font-size: 16px;
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .grid5 { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (max-width: 560px) {
      .grid3 { grid-template-columns: 1fr 1fr; }
    }
    ul.log {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    ul.log li {
      padding: 8px 0;
      border-bottom: 1px solid #23232a;
    }
    .tiny { font-size: 12px; }
    .meter {
      height: 10px;
      border-radius: 999px;
      background: #0d0d12;
      border: 1px solid #2e2e3b;
      overflow: hidden;
    }
    .meter > div {
      height: 100%;
      background: #2e2e3b;
    }
    .centerBox {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed #2e2e3b;
      background: #121218;
    }
    .carsWrap { margin-bottom: 12px; }
    .carsTitle {
      margin-bottom: 8px;
      font-size: 12px;
      color: #a6a6b3;
    }
    .cars {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .car {
      border: 1px solid #2e2e3b;
      border-radius: 12px;
      background: #14141a;
      padding: 10px 6px;
      text-align: center;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      transition: background .25s, border-color .25s, color .25s;
    }
    .car .num { font-weight: 800; }
    .car .role { font-size: 11px; color: #a6a6b3; }
    .car.destroyed {
      background: #3a1414;
      border-color: #8f2f2f;
      color: #ffb3b3;
    }
    .car.destroyed .role { color: #ffc7c7; }
    .overlayCard {
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      padding: 34px 16px;
    }
    .swrow {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      align-items: center;
      border: 1px solid #2e2e3b;
      border-radius: 12px;
      padding: 10px;
      background: #121218;
    }

    /* 縦スライダー */
    .verticalSpeedWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 320px;
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .verticalRange {
      -webkit-appearance: slider-vertical;
      appearance: auto;
      width: 28px;
      height: 260px;
      writing-mode: bt-lr;
      background: transparent;
      padding: 0;
      border: none;
    }
    /* fallback */
    @supports not (-webkit-appearance: slider-vertical) {
      .verticalFallback {
        width: 260px;
        height: 28px;
        transform: rotate(-90deg);
        transform-origin: center;
      }
    }
  </style>
</head>
<body>
<header class="split">
  <h1>運行解除端末</h1>
  <div class="row" style="gap:8px;">
    <button id="kpToggleBtn" class="small">KPモード</button>
    <button id="resetBtn" class="small">リセット</button>
  </div>
</header>

<main>
  <div class="carsWrap card">
    <div class="carsTitle">列車状態</div>
    <div id="carsLine" class="cars"></div>
  </div>

  <div class="row">
    <div class="card grow">
      <div class="split">
        <div>
          <div class="muted">状態</div>
          <div id="statusLine" class="pill"></div>
          <div class="muted tiny" id="stageHint" style="margin-top:8px;"></div>
        </div>
        <div style="text-align:right;">
          <div class="muted" id="rightTitle">次駅まで</div>
          <div id="rightBig" class="big"></div>
        </div>
      </div>

      <div style="margin-top:10px;" class="grid3">
        <div>
          <div class="muted tiny">現在速度</div>
          <div id="speedLine" style="font-size:22px;font-weight:800;">--</div>
        </div>
        <div>
          <div class="muted tiny">周波数</div>
          <div id="freqLine" style="font-size:22px;font-weight:800;">--</div>
          <div class="muted tiny" id="freqCommitLine" style="margin-top:6px;"></div>
        </div>
        <div>
          <div class="muted tiny">運行区間修正</div>
          <div id="areaLine" style="font-size:22px;font-weight:800;">--</div>
        </div>
      </div>

      <div style="margin-top:12px;">
        <div class="muted tiny">進捗</div>
        <div id="progressLine" style="margin-top:6px;"></div>
      </div>
    </div>

    <div class="card grow">
      <div class="muted">現在の判定</div>
      <div id="stationLine" style="font-size:22px;font-weight:900;margin-top:6px;">--</div>
      <div class="muted tiny" id="stationHint" style="margin-top:8px;"></div>
      <div style="margin-top:10px;">
        <div class="muted tiny">注意</div>
        <div class="pill bad" style="margin-top:6px;">停止（速度0）＝即爆発</div>
      </div>
    </div>
  </div>

  <h2>操作</h2>
  <div class="card" id="actionCard"></div>

  <h2>ログ</h2>
  <div class="card">
    <ul class="log" id="logList"></ul>
  </div>

  <h2 id="kpTitle" style="display:none;">KP管理</h2>
  <div class="card" id="kpPanel" style="display:none;"></div>
</main>

<script>
(() => {
  const defaultCfg = {
    stations: [
      { name: "駅1", type: "speed", targetSpeed: 63 },
      { name: "駅2", type: "freq", targetFreq: 118.7 },
      {
        name: "駅3",
        type: "area",
        targetCode: "7F-K2",
        targetSwitchStates: {
          "SW-A": false,
          "SW-B": true,
          "SW-C": false,
          "SW-D": false,
          "SW-E": true
        }
      }
    ],
    segmentTurns: 4,
    speedMin: 40,
    speedMax: 80,
    speedStep: 1,
    freqMin: 110.0,
    freqMax: 130.0,
    freqStep: 0.1,
    areaSwitchNames: ["SW-A", "SW-B", "SW-C", "SW-D", "SW-E"],
    brakeDrop: 10,
    finalTimeSec: 60,
    finalMode: "speed",
    finalTargetSpeed: 23,
    brakeDelayMs: 1800,
    initialSpeed: 60,
    initialFreq: 115.0,
    initialAreaCode: "",
    initialAreaSwitchStates: {
      "SW-A": false,
      "SW-B": false,
      "SW-C": false,
      "SW-D": false,
      "SW-E": false
    }
  };

  const CAR_ROLES = ["操縦室", "機器室", "客車A", "客車B", "客車C", "客車D", "最後尾"];

  const state = {
    cfg: structuredClone(defaultCfg),
    status: "armed",
    phase: "route",
    uiMode: "menu",
    turnsLeft: defaultCfg.segmentTurns,
    stationIndex: 0,
    stationResolvedCount: 0,
    cleared: [false, false, false],

    speed: defaultCfg.initialSpeed,
    freq: defaultCfg.initialFreq,
    freqCommitted: null,

    areaCode: defaultCfg.initialAreaCode,
    areaSwitchStates: structuredClone(defaultCfg.initialAreaSwitchStates),

    finalRemaining: defaultCfg.finalTimeSec,
    finalTimerId: null,

    destroyedCars: 0,
    earlyBrakeWarned: false,

    tuneHoldTimer: null,
    tuneHoldInterval: null,

    log: [],
    kpUnlocked: false
  };

  const KP_PASSWORD_HASH = "kp:" + "lovesushi";

  const $ = (id) => document.getElementById(id);
  const now = () => new Date().toLocaleTimeString();

  function addLog(msg, kind = "") {
    const prefix = kind === "ok" ? "✓ " : kind === "bad" ? "✗ " : "";
    state.log.push({ t: now(), msg: prefix + msg });
    if (state.log.length > 100) state.log.shift();
  }

  function stopFinalTimer() {
    if (state.finalTimerId) {
      clearInterval(state.finalTimerId);
      state.finalTimerId = null;
    }
  }

  function stopTuneHold() {
    if (state.tuneHoldTimer) {
      clearTimeout(state.tuneHoldTimer);
      state.tuneHoldTimer = null;
    }
    if (state.tuneHoldInterval) {
      clearInterval(state.tuneHoldInterval);
      state.tuneHoldInterval = null;
    }
  }

  function explode(reason) {
    if (state.status !== "armed") return;
    state.status = "exploded";
    stopFinalTimer();
    stopTuneHold();
    addLog(reason, "bad");
    render();
  }

  function defuse(reason) {
    if (state.status !== "armed") return;
    state.status = "defused";
    stopFinalTimer();
    stopTuneHold();
    addLog(reason || "解除成功", "ok");
    render();
  }

  function clampSpeed() {
    state.speed = Math.round(Math.max(state.cfg.speedMin, Math.min(state.cfg.speedMax, state.speed)));
    if (state.status === "armed" && state.speed <= 0) {
      explode("列車停止：即爆発");
    }
  }

  function clampFreq() {
    const step = state.cfg.freqStep;
    const v = Math.round(state.freq / step) * step;
    state.freq = Math.max(state.cfg.freqMin, Math.min(state.cfg.freqMax, Math.round(v * 10) / 10));
  }

  function getAreaSummary() {
    const onList = Object.entries(state.areaSwitchStates)
      .filter(([, v]) => v)
      .map(([k]) => k);
    return onList.length === 0 ? "全OFF" : onList.join(", ");
  }

  function applyPenaltyForStationExplosion() {
    const before = state.destroyedCars;
    state.destroyedCars = Math.min(6, state.destroyedCars + 2);

    const newlyDestroyed = [];
    for (let n = 7 - before; n >= 7 - state.destroyedCars + 1; n--) {
      newlyDestroyed.push(n);
    }
    if (newlyDestroyed.length > 0) {
      addLog(`後方車両が爆発に巻き込まれた：${newlyDestroyed.reverse().join("号車、")}号車 使用不能`, "bad");
    }
  }

  function handleStationFailure(detail) {
    addLog(`駅爆弾失敗（${detail}）`, "bad");
    applyPenaltyForStationExplosion();

    state.stationResolvedCount += 1;
    state.stationIndex = Math.min(2, state.stationIndex + 1);
    state.turnsLeft = Number(state.cfg.segmentTurns);

    if (state.stationResolvedCount >= state.cfg.stations.length) {
      state.phase = "final_ready";
      state.uiMode = "menu";
      addLog("全駅通過。最終爆弾フェイズへ移行可能。");
    }
    render();
  }

  function areaConditionMatches(targetStates) {
    return state.cfg.areaSwitchNames.every((name) => {
      const expected = !!targetStates[name];
      return !!state.areaSwitchStates[name] === expected;
    });
  }

  function passStation() {
    if (state.status !== "armed" || state.phase !== "route") return;

    const st = state.cfg.stations[state.stationIndex];
    addLog(`${st.name} 通過判定…`);

    let ok = false;
    let detail = "";

    if (st.type === "speed") {
      ok = Number(state.speed) === Number(st.targetSpeed);
      detail = `速度 ${state.speed}km/h / 条件 ${st.targetSpeed}`;
    }

    if (st.type === "freq") {
      if (state.freqCommitted === null) {
        ok = false;
        detail = `未送信`;
      } else {
        ok = Number(state.freqCommitted).toFixed(1) === Number(st.targetFreq).toFixed(1);
        detail = `送信 ${Number(state.freqCommitted).toFixed(1)}MHz / 条件 ${Number(st.targetFreq).toFixed(1)}`;
      }
    }

    if (st.type === "area") {
      const codeOk = String(state.areaCode).trim().toUpperCase() === String(st.targetCode).trim().toUpperCase();
      const switchesOk = areaConditionMatches(st.targetSwitchStates);
      ok = codeOk && switchesOk;
      detail = `コード ${codeOk ? "OK" : "NG"} / 区間修正 ${switchesOk ? "OK" : "NG"}`;
    }

    if (ok) {
      state.cleared[state.stationIndex] = true;
      addLog(`${st.name} 爆弾解除（${detail}）`, "ok");

      state.stationResolvedCount += 1;
      state.stationIndex = Math.min(2, state.stationIndex + 1);
      state.turnsLeft = Number(state.cfg.segmentTurns);

      if (state.stationResolvedCount >= state.cfg.stations.length) {
        state.phase = "final_ready";
        state.uiMode = "menu";
        addLog("全駅通過。最終爆弾フェイズへ移行可能。");
      }
      render();
      return;
    }

    handleStationFailure(detail);
  }

  function advanceTurn() {
    if (state.status !== "armed" || state.phase !== "route") return;
    state.turnsLeft -= 1;
    addLog(`ターン進行：次駅まで ${state.turnsLeft}`);
    if (state.turnsLeft <= 0) {
      passStation();
    } else {
      render();
    }
  }

  function startFinalPhase() {
    if (state.status !== "armed" || state.phase !== "final_ready") return;
    if (!confirm("最終爆弾フェイズに進みます。タイマーが起動します。OK？")) return;

    state.phase = "final";
    state.uiMode = "menu";
    state.finalRemaining = Number(state.cfg.finalTimeSec);
    state.freqCommitted = null;

    addLog(`最終爆弾フェイズ開始：残り ${state.finalRemaining} 秒`);

    stopFinalTimer();
    state.finalTimerId = setInterval(() => {
      if (state.status !== "armed") return;
      if (state.phase !== "final" && state.phase !== "brake_anim") return;

      state.finalRemaining -= 1;
      if (state.finalRemaining <= 0) {
        explode("爆弾が爆発しました");
      } else {
        renderTopRightOnly();
      }
    }, 1000);

    render();
  }

  function finalCommonStatus() {
    const freqOk =
      state.freqCommitted !== null &&
      Number(state.freqCommitted).toFixed(1) === Number(state.cfg.stations[1].targetFreq).toFixed(1);

    const codeOk =
      String(state.areaCode).trim().toUpperCase() === String(state.cfg.stations[2].targetCode).trim().toUpperCase();

    const switchOk = areaConditionMatches(state.cfg.stations[2].targetSwitchStates);
    const areaOk = codeOk && switchOk;

    return { freqOk, codeOk, switchOk, areaOk };
  }

  function attemptFinalPass() {
    if (state.status !== "armed" || state.phase !== "final") return;

    const c = $("areaCodeInput");
    if (c) state.areaCode = c.value;

    const common = finalCommonStatus();

    if (state.cfg.finalMode === "speed") {
      const speedOk = Number(state.speed) === Number(state.cfg.finalTargetSpeed);
      if (speedOk && common.freqOk && common.areaOk) {
        defuse("解除成功");
      } else {
        addLog(
          `最終判定失敗（速度:${speedOk ? "OK" : "NG"} / 周波数:${common.freqOk ? "OK" : "NG"} / 区間修正:${common.areaOk ? "OK" : "NG"}）`,
          "bad"
        );
        render();
      }
      return;
    }

    if (common.freqOk && common.areaOk) {
      state.phase = "brake_anim";
      state.uiMode = "menu";
      addLog("最終判定通過：非常ブレーキ演出へ");
      render();
    } else {
      addLog(
        `最終判定失敗（周波数:${common.freqOk ? "OK" : "NG"} / 区間修正:${common.areaOk ? "OK" : "NG"}）`,
        "bad"
      );
      render();
    }
  }

  function pullEmergencyBrake() {
    if (state.status !== "armed") return;

    if (state.phase !== "brake_anim") {
      if (!state.earlyBrakeWarned) {
        state.earlyBrakeWarned = true;
        const ok = confirm("本当にこの操作をしても良いのだろうか？");
        if (!ok) {
          addLog("非常ブレーキ操作を中止した");
          render();
          return;
        }
      }
      explode("非常ブレーキ作動：爆弾が爆発しました");
      return;
    }

    addLog("非常ブレーキを引き切った…");
    render();

    const common = finalCommonStatus();

    setTimeout(() => {
      if (state.status !== "armed") return;
      if (common.freqOk && common.areaOk) {
        defuse("解除成功");
      } else {
        state.phase = "final";
        addLog("非常ブレーキ演出失敗：条件不足", "bad");
        render();
      }
    }, Number(state.cfg.brakeDelayMs));
  }

  function renderTopRightOnly() {
    if (state.phase === "final" || state.phase === "brake_anim") {
      $("rightTitle").textContent = "残り時間";
      $("rightBig").textContent = `${Math.max(0, state.finalRemaining)}s`;
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderCars() {
    const destroyedStart = 8 - state.destroyedCars;
    $("carsLine").innerHTML = CAR_ROLES.map((role, idx) => {
      const n = idx + 1;
      const destroyed = state.destroyedCars > 0 && n >= destroyedStart;
      return `
        <div class="car ${destroyed ? "destroyed" : ""}">
          <div class="num">${destroyed ? "X" : n}</div>
          <div class="role">${escapeHtml(role)}</div>
        </div>
      `;
    }).join("");
  }

  function formatTargetSwitchStates(states) {
    return state.cfg.areaSwitchNames
      .map((name) => `${name}:${states[name] ? "ON" : "OFF"}`)
      .join(" / ");
  }

  function renderFinalCommonText() {
    const common = finalCommonStatus();
    const modeText = state.cfg.finalMode === "speed"
      ? `指定速度 ${state.cfg.finalTargetSpeed}km/h`
      : `非常ブレーキを使用`;

    return `
      最終条件：
      ${escapeHtml(modeText)} /
      周波数 ${Number(state.cfg.stations[1].targetFreq).toFixed(1)}MHz 送信済み /
      コード ${escapeHtml(state.cfg.stations[2].targetCode)} /
      ${escapeHtml(formatTargetSwitchStates(state.cfg.stations[2].targetSwitchStates))}
      <br>
      現在：
      周波数 ${common.freqOk ? "OK" : "NG"} /
      コード ${common.codeOk ? "OK" : "NG"} /
      区間修正 ${common.switchOk ? "OK" : "NG"}
    `;
  }

  function renderMenuActions() {
    const routeButtons = state.phase === "route" ? `
      <div class="grid2" style="margin-top:12px;">
        <button onclick="window.__turn()">ターン進行（次駅まで -1）</button>
        <button onclick="window.__forcePass()">今すぐ通過判定（演出/デバッグ用）</button>
      </div>
    ` : "";

    const finalReady = state.phase === "final_ready" ? `
      <div class="centerBox" style="margin-bottom:12px;">
        <button class="cta" onclick="window.__startFinal()">最終爆弾フェイズへ</button>
      </div>
    ` : "";

    const finalButton = state.phase === "final" ? `
      <div class="centerBox" style="margin-top:12px;">
        <button class="cta" onclick="window.__finalPass()">通過判定</button>
      </div>
      <div class="muted tiny" style="margin-top:12px;">${renderFinalCommonText()}</div>
    ` : "";

    const brakePrompt = state.phase === "brake_anim" ? `
      <div class="centerBox" style="margin-bottom:12px; flex-direction:column; gap:12px;">
        <div class="bad" style="font-size:22px;font-weight:900;">非常ブレーキを引け</div>
        <div class="muted tiny">機械の唸りが伝わってくる……</div>
      </div>
    ` : "";

    return `
      ${finalReady}
      ${brakePrompt}

      <div class="grid3">
        <button onclick="window.__setUiMode('speed')" ${state.phase === "brake_anim" ? "disabled" : ""}>列車操作</button>
        <button onclick="window.__setUiMode('freq')" ${state.phase === "brake_anim" ? "disabled" : ""}>周波数調整</button>
        <button onclick="window.__setUiMode('area')" ${state.phase === "brake_anim" ? "disabled" : ""}>運行区間修正</button>
      </div>

      ${routeButtons}
      ${finalButton}
    `;
  }

  function renderSpeedActions() {
    const speedPct = ((state.speed - state.cfg.speedMin) / (state.cfg.speedMax - state.cfg.speedMin)) * 100;
    return `
      <div class="card" style="padding:12px;">
        <div style="font-size:16px;font-weight:800;">列車操作</div>
        <div class="muted tiny" style="margin-top:6px;">停止＝即爆発</div>

        <div class="split" style="margin-top:12px; align-items:flex-start;">
          <div style="font-size:28px;font-weight:900;">${state.speed} km/h</div>
          <div class="verticalSpeedWrap">
            <input id="speedSlider" class="verticalRange" type="range"
              min="${state.cfg.speedMin}" max="${state.cfg.speedMax}" step="${state.cfg.speedStep}"
              value="${state.speed}" />
          </div>
        </div>

        <div class="split" style="margin-top:8px;">
          <span class="muted tiny">${state.cfg.speedMin}</span>
          <span class="pill">${state.speed} km/h</span>
          <span class="muted tiny">${state.cfg.speedMax}</span>
        </div>

        <div class="meter" style="margin-top:10px;"><div style="width:${speedPct}%;"></div></div>

        <div class="grid2" style="margin-top:12px;">
          <button onclick="window.__brake()">通常ブレーキ（-${state.cfg.brakeDrop} km/h）</button>
          <button class="danger" onclick="window.__ebrake()">非常ブレーキ</button>
        </div>

        <div style="margin-top:12px;">
          <button onclick="window.__setUiMode('menu')">戻る</button>
        </div>
      </div>
    `;
  }

  function renderFreqActions() {
    return `
      <div class="card" style="padding:12px;">
        <div style="font-size:16px;font-weight:800;">周波数調整</div>
        <div class="muted tiny" style="margin-top:6px;">長押しで連続調整 / 何度でも送信し直せる</div>

        <div style="font-size:28px;font-weight:900;margin-top:12px;">${state.freq.toFixed(1)} MHz</div>
        <div class="muted tiny" style="margin-top:6px;">
          ${state.freqCommitted === null ? "未送信" : `送信済: ${Number(state.freqCommitted).toFixed(1)}MHz`}
        </div>

        <div class="grid2" style="margin-top:12px;">
          <button id="tuneDown01">◀ 0.1</button>
          <button id="tuneUp01">0.1 ▶</button>
        </div>

        <div class="grid2" style="margin-top:10px;">
          <button id="tuneDown05">-0.5</button>
          <button id="tuneUp05">+0.5</button>
        </div>

        <div style="margin-top:12px;">
          <button onclick="window.__sendFreq()">送信して確定</button>
        </div>

        <div style="margin-top:12px;">
          <button onclick="window.__setUiMode('menu')">戻る</button>
        </div>
      </div>
    `;
  }

  function renderAreaActions() {
    return `
      <div class="card" style="padding:12px;">
        <div style="font-size:16px;font-weight:800;">運行区間修正</div>

        <div class="muted tiny" style="margin-top:10px;">コード</div>
        <input id="areaCodeInput" placeholder="例：7F-K2" value="${escapeHtml(state.areaCode)}" />

        <div class="muted tiny" style="margin-top:12px;">スイッチ群</div>
        <div class="grid5" style="margin-top:8px;">
          ${state.cfg.areaSwitchNames.map((name) => `
            <div class="swrow">
              <div style="font-weight:800;">${escapeHtml(name)}</div>
              <button class="onbtn" onclick="window.__setAreaSwitch('${name}', true)">ON</button>
              <button class="offbtn" onclick="window.__setAreaSwitch('${name}', false)">OFF</button>
            </div>
            <div class="tiny muted" style="margin-top:-4px; margin-bottom:4px;">現在：${state.areaSwitchStates[name] ? "ON" : "OFF"}</div>
          `).join("")}
        </div>

        <div style="margin-top:12px;">
          <button onclick="window.__setUiMode('menu')">戻る</button>
        </div>
      </div>
    `;
  }

  function bindTuneHold(buttonId, delta) {
    const btn = $(buttonId);
    if (!btn) return;

    const start = (e) => {
      e.preventDefault();
      if (state.status !== "armed" || state.phase === "brake_anim") return;

      stopTuneHold();

      state.freq += Number(delta) * Number(state.cfg.freqStep);
      clampFreq();
      render();

      state.tuneHoldTimer = setTimeout(() => {
        state.tuneHoldInterval = setInterval(() => {
          if (state.status !== "armed" || state.phase === "brake_anim") {
            stopTuneHold();
            return;
          }
          state.freq += Number(delta) * Number(state.cfg.freqStep);
          clampFreq();
          render();
        }, 80);
      }, 250);
    };

    const stop = () => stopTuneHold();

    btn.addEventListener("pointerdown", start);
    btn.addEventListener("pointerup", stop);
    btn.addEventListener("pointerleave", stop);
    btn.addEventListener("pointercancel", stop);

    btn.addEventListener("touchstart", start, { passive: false });
    btn.addEventListener("touchend", stop, { passive: true });
    btn.addEventListener("touchcancel", stop, { passive: true });

    btn.addEventListener("mousedown", start);
    btn.addEventListener("mouseup", stop);
    btn.addEventListener("mouseleave", stop);
  }

  function renderTerminalMessage() {
    if (state.status !== "armed") {
      if (state.status === "exploded") {
        $("actionCard").innerHTML = `<div class="overlayCard bad">爆弾が爆発しました</div>`;
      } else if (state.status === "defused") {
        $("actionCard").innerHTML = `<div class="overlayCard ok">解除成功</div>`;
      }
    }
  }

  function renderActions() {
    if (state.status !== "armed") {
      renderTerminalMessage();
      return;
    }

    if (state.phase === "brake_anim") {
      $("actionCard").innerHTML = renderMenuActions();
      return;
    }

    if (state.uiMode === "speed") {
      $("actionCard").innerHTML = renderSpeedActions();
    } else if (state.uiMode === "freq") {
      $("actionCard").innerHTML = renderFreqActions();
    } else if (state.uiMode === "area") {
      $("actionCard").innerHTML = renderAreaActions();
    } else {
      $("actionCard").innerHTML = renderMenuActions();
    }

    setTimeout(() => {
      const s = $("speedSlider");
      if (s) {
        s.oninput = () => {
          state.speed = Number(s.value);
          clampSpeed();
          render();
        };
      }

      const c = $("areaCodeInput");
      if (c) {
        c.oninput = () => { state.areaCode = c.value; };
      }

      bindTuneHold("tuneDown01", -1);
      bindTuneHold("tuneUp01", 1);
      bindTuneHold("tuneDown05", -5);
      bindTuneHold("tuneUp05", 5);
    }, 0);
  }

  function render() {
    renderCars();

    $("statusLine").textContent = `${state.status}${state.phase !== "route" ? " / " + state.phase : ""}`;
    $("statusLine").className = "pill " + (state.status === "defused" ? "ok" : state.status === "exploded" ? "bad" : "");

    if (state.phase === "final" || state.phase === "brake_anim") {
      $("rightTitle").textContent = "残り時間";
      $("rightBig").textContent = `${Math.max(0, state.finalRemaining)}s`;
    } else {
      $("rightTitle").textContent = "次駅まで";
      $("rightBig").textContent = `T-${Math.max(0, state.turnsLeft)}`;
    }

    $("speedLine").textContent = `${state.speed} km/h`;
    $("freqLine").textContent = `${state.freq.toFixed(1)} MHz`;
    $("freqCommitLine").innerHTML =
      state.freqCommitted === null
        ? `<span class="pill">未送信</span>`
        : `<span class="pill ok">送信済: ${Number(state.freqCommitted).toFixed(1)}MHz</span>`;
    $("areaLine").textContent = getAreaSummary();

    if (state.phase === "route") {
      const st = state.cfg.stations[state.stationIndex];
      $("stationLine").textContent = st.name;
      $("stationHint").textContent =
        st.type === "speed" ? "駅1：通過瞬間の速度一致で解除。" :
        st.type === "freq"  ? "駅2：指定周波数を送信済みで通過すると解除。" :
                              "駅3：コード一致＋必要な運行区間修正で解除。";
      $("stageHint").textContent = "停止＝即爆発。駅爆弾失敗時は後方車両が失われる。";
    } else if (state.phase === "final_ready") {
      $("stationLine").textContent = "最終爆弾フェイズ待機";
      $("stationHint").textContent = "全駅通過。中央のボタンで最終フェイズへ。";
      $("stageHint").textContent = "最終条件はKPのみが知っている。";
    } else if (state.phase === "final") {
      $("stationLine").textContent = "最終爆弾フェイズ";
      $("stationHint").textContent = "条件を揃えて『通過判定』。";
      $("stageHint").textContent = "最終解答方式はKPのみが知っている。";
    } else if (state.phase === "brake_anim") {
      $("stationLine").textContent = "非常ブレーキ演出";
      $("stationHint").textContent = "今しか引けない。";
      $("stageHint").textContent = "引き切れ。";
    }

    const prog = [
      `${state.cfg.stations[0].name}:${state.cleared[0] ? "解除" : "未解除"}`,
      `${state.cfg.stations[1].name}:${state.cleared[1] ? "解除" : "未解除"}`,
      `${state.cfg.stations[2].name}:${state.cleared[2] ? "解除" : "未解除"}`,
      `車両被害:${state.destroyedCars}両`
    ].join(" / ");
    $("progressLine").innerHTML = `<span class="pill">${escapeHtml(prog)}</span>`;

    renderActions();

    $("logList").innerHTML = state.log.slice().reverse().map(e =>
      `<li><span class="muted">${escapeHtml(e.t)}</span> — ${escapeHtml(e.msg)}</li>`
    ).join("") || `<li class="muted">（まだログはありません）</li>`;

    $("kpTitle").style.display = state.kpUnlocked ? "" : "none";
    $("kpPanel").style.display = state.kpUnlocked ? "" : "none";
    if (state.kpUnlocked) renderKP();
  }

  window.__setUiMode = (mode) => {
    if (state.status !== "armed") return;
    if (!["menu", "speed", "freq", "area"].includes(mode)) return;
    if (state.phase === "brake_anim") return;
    stopTuneHold();
    state.uiMode = mode;
    render();
  };

  window.__turn = () => {
    if (state.status !== "armed" || state.phase !== "route") return;
    const c = $("areaCodeInput");
    if (c) state.areaCode = c.value;
    advanceTurn();
  };

  window.__forcePass = () => {
    if (state.status !== "armed" || state.phase !== "route") return;
    const c = $("areaCodeInput");
    if (c) state.areaCode = c.value;
    if (!confirm("通過判定を実行します。OK？")) return;
    passStation();
  };

  window.__startFinal = () => startFinalPhase();
  window.__finalPass = () => attemptFinalPass();

  window.__brake = () => {
    if (state.status !== "armed" || state.phase === "brake_anim") return;
    state.speed -= Number(state.cfg.brakeDrop);
    clampSpeed();
    addLog(`通常ブレーキ：速度 ${state.speed}km/h`);
    render();
  };

  window.__ebrake = () => pullEmergencyBrake();

  window.__sendFreq = () => {
    if (state.status !== "armed" || state.phase === "brake_anim") return;
    state.freqCommitted = Number(state.freq.toFixed(1));
    addLog(`周波数送信：${state.freqCommitted.toFixed(1)}MHz`, "ok");
    render();
  };

  window.__setAreaSwitch = (name, on) => {
    if (state.status !== "armed" || state.phase === "brake_anim") return;
    state.areaSwitchStates[name] = !!on;
    addLog(`${name} を ${on ? "ON" : "OFF"} にした`);
    render();
  };

  $("kpToggleBtn").addEventListener("click", () => {
    if (!state.kpUnlocked) {
      const pw = prompt("KPパスワードを入力");
      if (!pw) return;
      if (("kp:" + pw) === KP_PASSWORD_HASH) {
        state.kpUnlocked = true;
        addLog("KPモード：解錠");
      } else {
        alert("パスワードが違います");
      }
    } else {
      state.kpUnlocked = false;
      addLog("KPモード：ロック");
    }
    render();
  });

  function renderKP() {
    const targetStates = state.cfg.stations[2].targetSwitchStates;
    $("kpPanel").innerHTML = `
      <div class="muted tiny">KPのみ：条件・初期値・最終方式を編集できます。</div>

      <h2>駅条件</h2>
      <div class="grid3">
        <div>
          <div class="muted tiny">駅1 速度</div>
          <input id="kp_speed1" type="number" value="${Number(state.cfg.stations[0].targetSpeed)}" />
        </div>
        <div>
          <div class="muted tiny">駅2 周波数</div>
          <input id="kp_freq2" type="number" step="0.1" value="${Number(state.cfg.stations[1].targetFreq)}" />
        </div>
        <div>
          <div class="muted tiny">駅3 コード</div>
          <input id="kp_code3" value="${escapeHtml(state.cfg.stations[2].targetCode)}" />
        </div>
      </div>

      <div style="margin-top:12px;">
        <div class="muted tiny">駅3 必要スイッチ状態</div>
        <div class="grid5" style="margin-top:8px;">
          ${state.cfg.areaSwitchNames.map((name) => `
            <div class="swrow">
              <div style="font-weight:800;">${escapeHtml(name)}</div>
              <button class="onbtn" data-kpsw="${escapeHtml(name)}" data-kpstate="on">ON</button>
              <button class="offbtn" data-kpsw="${escapeHtml(name)}" data-kpstate="off">OFF</button>
            </div>
            <div class="tiny muted" style="margin-top:-4px; margin-bottom:4px;">必要状態：${targetStates[name] ? "ON" : "OFF"}</div>
          `).join("")}
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div>
          <div class="muted tiny">駅間ターン</div>
          <input id="kp_segturn" type="number" value="${Number(state.cfg.segmentTurns)}" />
        </div>
        <div>
          <div class="muted tiny">最終タイマー（秒）</div>
          <input id="kp_finalSec" type="number" value="${Number(state.cfg.finalTimeSec)}" />
        </div>
      </div>

      <h2>初期値</h2>
      <div class="grid2" style="margin-top:12px;">
        <div>
          <div class="muted tiny">初期速度</div>
          <input id="kp_initialSpeed" type="number" value="${Number(state.cfg.initialSpeed)}" />
        </div>
        <div>
          <div class="muted tiny">初期周波数</div>
          <input id="kp_initialFreq" type="number" step="0.1" value="${Number(state.cfg.initialFreq)}" />
        </div>
      </div>

      <h2>最終条件</h2>
      <div class="grid2">
        <div>
          <div class="muted tiny">最終方式</div>
          <select id="kp_finalMode">
            <option value="speed" ${state.cfg.finalMode === "speed" ? "selected" : ""}>指定速度</option>
            <option value="ebrake" ${state.cfg.finalMode === "ebrake" ? "selected" : ""}>非常ブレーキ</option>
          </select>
        </div>
        <div>
          <div class="muted tiny">最終指定速度</div>
          <input id="kp_finalSpeed" type="number" value="${Number(state.cfg.finalTargetSpeed)}" />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <div>
          <div class="muted tiny">通常ブレーキ減速量</div>
          <input id="kp_brakeDrop" type="number" value="${Number(state.cfg.brakeDrop)}" />
        </div>
        <div>
          <div class="muted tiny">非常ブレーキ演出待機(ms)</div>
          <input id="kp_brakeDelay" type="number" value="${Number(state.cfg.brakeDelayMs)}" />
        </div>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <button id="kpApplyBtn">KP設定を適用</button>
        <button id="kpResetPenaltyBtn">車両被害をリセット</button>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <button id="kpPhaseBtn">フェイズ強制変更</button>
        <button id="kpExplodeBtn">強制爆発</button>
      </div>

      <div class="grid2" style="margin-top:12px;">
        <button id="kpDefuseBtn">強制解除</button>
        <button id="kpNoteBtn">ログ追記</button>
      </div>

      <div style="margin-top:10px;">
        <input id="kp_note" placeholder="例：『通信室の端末が反応』" />
      </div>
    `;

    document.querySelectorAll("[data-kpsw]").forEach(btn => {
      btn.addEventListener("click", () => {
        const sw = btn.getAttribute("data-kpsw");
        const on = btn.getAttribute("data-kpstate") === "on";
        state.cfg.stations[2].targetSwitchStates[sw] = on;
        render();
      });
    });

    $("kpApplyBtn").onclick = () => {
      const nextSpeed1 = Number($("kp_speed1").value);
      const nextFreq2 = Number($("kp_freq2").value);
      const nextCode3 = ($("kp_code3").value || "").trim();
      const nextSegTurn = Math.max(1, Number($("kp_segturn").value));
      const nextFinalSec = Math.max(5, Number($("kp_finalSec").value));
      const nextInitialSpeed = Number($("kp_initialSpeed").value);
      const nextInitialFreq = Number($("kp_initialFreq").value);
      const nextFinalMode = $("kp_finalMode").value;
      const nextFinalSpeed = Number($("kp_finalSpeed").value);
      const nextBrakeDrop = Math.max(1, Number($("kp_brakeDrop").value));
      const nextBrakeDelay = Math.max(200, Number($("kp_brakeDelay").value));

      state.cfg.stations[0].targetSpeed = nextSpeed1;
      state.cfg.stations[1].targetFreq = nextFreq2;
      state.cfg.stations[2].targetCode = nextCode3;
      state.cfg.segmentTurns = nextSegTurn;
      state.cfg.finalTimeSec = nextFinalSec;
      state.cfg.initialSpeed = nextInitialSpeed;
      state.cfg.initialFreq = nextInitialFreq;
      state.cfg.finalMode = nextFinalMode;
      state.cfg.finalTargetSpeed = nextFinalSpeed;
      state.cfg.brakeDrop = nextBrakeDrop;
      state.cfg.brakeDelayMs = nextBrakeDelay;

      addLog("KP操作：設定を適用");
      render();
    };

    $("kpResetPenaltyBtn").onclick = () => {
      state.destroyedCars = 0;
      addLog("KP操作：車両被害をリセット");
      render();
    };

    $("kpPhaseBtn").onclick = () => {
      const next = prompt("phaseを入力（route / final_ready / final / brake_anim）", state.phase);
      if (!next) return;
      if (!["route", "final_ready", "final", "brake_anim"].includes(next)) {
        alert("不正なフェイズです");
        return;
      }
      state.phase = next;
      if (next !== "final" && next !== "brake_anim") {
        stopFinalTimer();
        state.finalRemaining = Number(state.cfg.finalTimeSec);
      }
      addLog(`KP操作：phaseを ${next} に変更`);
      render();
    };

    $("kpExplodeBtn").onclick = () => {
      if (!confirm("KP操作：強制爆発していい？")) return;
      explode("爆弾が爆発しました");
    };

    $("kpDefuseBtn").onclick = () => {
      if (!confirm("KP操作：強制解除していい？")) return;
      defuse("解除成功");
    };

    $("kpNoteBtn").onclick = () => {
      const v = ($("kp_note").value || "").trim();
      if (!v) return;
      addLog(`KPメモ：${v}`);
      $("kp_note").value = "";
      render();
    };
  }

  $("resetBtn").addEventListener("click", () => {
    if (!confirm("状態をリセットします（KP設定は維持）。OK？")) return;

    const keepCfg = structuredClone(state.cfg);
    const keepKP = state.kpUnlocked;

    stopFinalTimer();
    stopTuneHold();

    state.cfg = keepCfg;
    state.kpUnlocked = keepKP;

    state.status = "armed";
    state.phase = "route";
    state.uiMode = "menu";

    state.turnsLeft = keepCfg.segmentTurns;
    state.stationIndex = 0;
    state.stationResolvedCount = 0;
    state.cleared = [false, false, false];

    state.speed = keepCfg.initialSpeed;
    state.freq = keepCfg.initialFreq;
    state.freqCommitted = null;

    state.areaCode = keepCfg.initialAreaCode;
    state.areaSwitchStates = structuredClone(keepCfg.initialAreaSwitchStates);

    state.finalRemaining = keepCfg.finalTimeSec;
    state.destroyedCars = 0;
    state.earlyBrakeWarned = false;

    state.log = [];
    addLog("システム起動。停止＝即爆発。条件を揃えて通過せよ。");
    render();
  });

  addLog("システム起動。停止＝即爆発。条件を揃えて通過せよ。");
  render();
})();
</script>
</body>
</html>
